<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaque Pontes Romualdo - Links</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            padding: 50px 20px;
            text-align: center;
            box-sizing: border-box;
        }
        
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2c3e50;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 3px solid #4a90e2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            margin: 0 0 5px 0;
            font-size: 26px;
            font-weight: 600;
        }
        
        p {
            margin: 0 0 35px 0;
            font-size: 16px;
            color: #b3b3b3;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .link-btn {
            display: block;
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        
        .link-btn:hover {
            background-color: #4a90e2;
            transform: translateY(-3px);
            border-color: #4a90e2;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }
        /* Se quiser trocar o emoji por uma foto real, apague o emoji da div .profile-pic, adicione uma tag <img> lá dentro e use esta classe: */
        
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- Foto de Perfil (usando emoji temporariamente) -->
        <div class="profile-pic">👨‍💻</div>

        <h1>Isaque Pontes Romualdo</h1>
        <p>Instrutor de Informática | SENAI</p>

        <!-- Lista de Links -->
        <div class="links">
            <!-- Substitua o "#" pelos links reais -->
            <a href="https://www.linkedin.com/in/isaqlle/" class="link-btn" target="_blank">💼 LinkedIn</a>
            <a href="https://github.com/isaqlle" class="link-btn" target="_blank">💻 GitHub</a>
            <a href="https://lattes.cnpq.br/9420821211096452" class="link-btn" target="_blank">📚 Curriculum Lattes</a>
            <a href="https://www.instagram.com/isaqlle/" class="link-btn" target="_blank">📸 Instagram</a>
        </div>

    </div>
</body>

</html>
